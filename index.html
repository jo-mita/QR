<style>
  /* Estilos para el control de páginas */
  .paginacion {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin: 20px 0;
    color: white;
    font-family: sans-serif;
  }
  .paginacion button {
    background: #00c6ff;
    color: white;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
  }
  .paginacion button:disabled {
    background: #666;
    cursor: not-allowed;
    opacity: 0.5;
  }
  #infoPagina {
    font-size: 1.1em;
    min-width: 150px;
    text-align: center;
  }
</style>

<div class="top-bar">
  <input id="buscador" placeholder="Buscar por nombre..." onkeyup="buscar()">
  <button onclick="descargarTodos()">Descargar ZIP (Completo)</button>
  <button onclick="generarPDF()">Descargar PDF (Completo)</button>
</div>

<div class="paginacion">
  <button id="btnPrev" onclick="cambiarPagina(-1)">« Anterior</button>
  <span id="infoPagina">Página 1 de 1</span>
  <button id="btnNext" onclick="cambiarPagina(1)">Siguiente »</button>
</div>

<div id="lista"></div>

<script>
// --- CONFIGURACIÓN Y SEGURIDAD ---
const CLAVE_ADMIN = "1234"; // Cambia tu clave aquí
const registrosPorPagina = 50; // <--- Ahora configurado a 50

let dataCompleta = [];
let dataFiltrada = [];
let qrMap = {};
let paginaActual = 1;

// Bloqueo de seguridad inicial
const intento = prompt("Ingrese clave de acceso:");
if(intento === CLAVE_ADMIN) {
  document.body.style.display = "block";
  window.onload = cargarDatos;
} else {
  alert("Clave incorrecta");
  window.location.href = "about:blank";
}

function cargarDatos() {
  fetch('data.json')
    .then(res => res.json())
    .then(json => {
      dataCompleta = json;
      dataFiltrada = json;
      actualizarVista();
      generarMapaTotal(); // Inicia la creación silenciosa para descargas
    })
    .catch(err => alert("Error al cargar data.json. Revisa el formato."));
}

function buscar() {
  const texto = document.getElementById('buscador').value.toLowerCase();
  dataFiltrada = dataCompleta.filter(p => p.nombre.toLowerCase().includes(texto));
  paginaActual = 1;
  actualizarVista();
}

function cambiarPagina(direccion) {
  const totalPaginas = Math.ceil(dataFiltrada.length / registrosPorPagina);
  const nuevaPagina = paginaActual + direccion;
  
  if(nuevaPagina >= 1 && nuevaPagina <= totalPaginas) {
    paginaActual = nuevaPagina;
    actualizarVista();
    window.scrollTo({top: 0, behavior: 'smooth'}); // Sube suavemente al inicio
  }
}

function actualizarVista() {
  const cont = document.getElementById('lista');
  cont.innerHTML = '';
  
  const totalPaginas = Math.ceil(dataFiltrada.length / registrosPorPagina) || 1;
  const inicio = (paginaActual - 1) * registrosPorPagina;
  const fin = inicio + registrosPorPagina;
  const itemsAMostrar = dataFiltrada.slice(inicio, fin);

  // Actualizar textos y botones
  document.getElementById('infoPagina').innerText = `Página ${paginaActual} de ${totalPaginas}`;
  document.getElementById('btnPrev').disabled = (paginaActual === 1);
  document.getElementById('btnNext').disabled = (paginaActual === totalPaginas);

  itemsAMostrar.forEach((p, index) => {
    const div = document.createElement('div');
    div.className = 'card';
    const qrId = `qr-${p.id}`;

    div.innerHTML = `
      <h3>${p.nombre}</h3>
      <div class="info"><b>Hab:</b> ${p.habitacion}</div>
      <div class="info"><b>Iglesia:</b> ${p.iglesia}</div>
      <div id="${qrId}" class="qr"></div>
    `;
    cont.appendChild(div);

    // Generación escalonada para evitar bloqueos del mouse
    setTimeout(() => {
      new QRCode(document.getElementById(qrId), {
        text: window.location.origin + '/persona.html?key=' + (p.key || p.id),
        width: 130,
        height: 130
      });
    }, index * 30); 
  });
}

// Procesa todos los QR en segundo plano para que el ZIP/PDF estén listos sin esperar
function generarMapaTotal() {
  dataCompleta.forEach((p, index) => {
    setTimeout(() => {
      const tempDiv = document.createElement('div');
      new QRCode(tempDiv, {
        text: window.location.origin + '/persona.html?key=' + (p.key || p.id),
        width: 150, height: 150
      });
      setTimeout(() => {
        const canvas = tempDiv.querySelector('canvas');
        if(canvas) qrMap[`${p.id}_${p.nombre}`] = canvas;
      }, 200);
    }, index * 15);
  });
}

// --- FUNCIONES DE DESCARGA (ZIP Y PDF) ---
async function descargarTodos(){
  alert("Preparando ZIP con todos los códigos... por favor espera un momento.");
  const zip = new JSZip();
  for (const nombre in qrMap){
    const canvas = qrMap[nombre];
    const base64 = canvas.toDataURL("image/png").split(',')[1];
    zip.file(nombre + ".png", base64, {base64: true});
  }
  const contenido = await zip.generateAsync({type:"blob"});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(contenido);
  link.download = "QR_TODOS_COMPLETO.zip";
  link.click();
}

async function generarPDF(){
  alert("Generando PDF... esto puede tardar unos segundos.");
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();
  let x = 10; let y = 10;

  const llaves = Object.keys(qrMap);
  if(llaves.length === 0) return alert("Los códigos aún se están procesando. Intenta en 5 segundos.");

  for (const nombre of llaves){
    const canvas = qrMap[nombre];
    const img = canvas.toDataURL("image/png");
    pdf.setFontSize(8);
    pdf.text(nombre, x, y);
    pdf.addImage(img, 'PNG', x, y+2, 35, 35);
    x += 50;
    if(x > 160) { x = 10; y += 50; }
    if(y > 250) { pdf.addPage(); x = 10; y = 10; }
  }
  pdf.save("Carnets_QR_Completo.pdf");
}
</script>
