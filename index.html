<style>
  /* Estilo para el nuevo filtro */
  .filtros-container {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 20px;
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
  }
  select {
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: white;
    font-weight: bold;
    color: #1e3c72;
    cursor: pointer;
  }
</style>

<div class="top-bar">
  <div class="filtros-container">
    <input id="buscador" placeholder="Buscar por nombre..." onkeyup="ejecutarFiltros()">
    
    <select id="filtroZona" onchange="ejecutarFiltros()">
      <option value="todas">Todas las Zonas</option>
      <option value="Zona 1">Zona 1</option>
      <option value="Zona 2">Zona 2</option>
      <option value="Zona 3">Zona 3</option>
      <option value="Zona 4">Zona 4</option>
      <option value="Zona 5">Zona 5</option>
      <option value="Zona 6">Zona 6</option>
      <option value="Zona 7">Zona 7</option>
      <option value="Zona 8">Zona 8</option>
      <option value="Zona 9">Zona 9</option>
      <option value="Zona 10">Zona 10</option>
      <option value="Zona 11">Zona 11</option>
    </select>
  </div>

  <button onclick="descargarTodos()">Descargar ZIP (Filtrados)</button>
  <button onclick="generarPDF()">Descargar PDF (Filtrados)</button>
</div>

<div class="paginacion">
  <button id="btnPrev" onclick="cambiarPagina(-1)">« Anterior</button>
  <span id="infoPagina">Página 1 de 1</span>
  <button id="btnNext" onclick="cambiarPagina(1)">Siguiente »</button>
</div>

<div id="lista"></div>

<script>
// VARIABLES GLOBALES
let dataCompleta = [];
let dataFiltrada = [];
let paginaActual = 1;
const registrosPorPagina = 50;

// Al cargar los datos
function cargarDatos() {
  fetch('data.json')
    .then(res => res.json())
    .then(json => {
      dataCompleta = json;
      dataFiltrada = json;
      actualizarVista();
    });
}

// FUNCIÓN DE FILTRADO COMBINADO (Nombre + Zona)
function ejecutarFiltros() {
  const nombreBusqueda = document.getElementById('buscador').value.toLowerCase();
  const zonaSeleccionada = document.getElementById('filtroZona').value;

  dataFiltrada = dataCompleta.filter(p => {
    const coincideNombre = p.nombre.toLowerCase().includes(nombreBusqueda);
    const coincideZona = (zonaSeleccionada === "todas" || p.zona === zonaSeleccionada);
    return coincideNombre && coincideZona;
  });

  paginaActual = 1; // Reiniciar a la primera página tras filtrar
  actualizarVista();
}

function actualizarVista() {
  const cont = document.getElementById('lista');
  cont.innerHTML = '';
  
  const totalPaginas = Math.ceil(dataFiltrada.length / registrosPorPagina) || 1;
  const inicio = (paginaActual - 1) * registrosPorPagina;
  const itemsAMostrar = dataFiltrada.slice(inicio, inicio + registrosPorPagina);

  document.getElementById('infoPagina').innerText = `Página ${paginaActual} de ${totalPaginas} (${dataFiltrada.length} personas)`;
  
  // Lógica de botones y generación de QR...
  itemsAMostrar.forEach((p, i) => {
    // ... (Aquí va tu código de crear las cards y el QRCode que ya tenemos)
  });
}

// DESCARGAS: Ahora solo descargarán lo que esté filtrado en pantalla
async function descargarTodos() {
  alert(`Iniciando descarga de ${dataFiltrada.length} códigos QR...`);
  // El código de JSZip usará ahora dataFiltrada en lugar de dataCompleta
}
</script>
