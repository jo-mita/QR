<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema QR PRO - Admin</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    /* Recuperando tu estilo original con mejoras */
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      margin: 0;
      padding: 20px;
      color: #333;
      display: none; /* Se activa con la clave */
      min-height: 100vh;
    }

    h1 { text-align: center; color: white; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

    .top-bar {
      background: rgba(255, 255, 255, 0.15);
      padding: 20px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      margin-bottom: 20px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .filtros-container {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    input, select {
      padding: 12px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    input { width: 250px; }
    select { background: white; color: #1e3c72; font-weight: bold; cursor: pointer; }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #00c6ff;
      color: white;
      font-weight: bold;
      transition: 0.3s;
      margin: 5px;
    }

    button:hover { background: #0072ff; transform: translateY(-2px); }
    button:disabled { background: #666; opacity: 0.5; cursor: not-allowed; }

    /* Estilo de la Paginación */
    .paginacion {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin: 20px 0;
      color: white;
    }

    #lista {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      max-width: 1300px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      text-align: center;
      transition: 0.3s;
    }

    .card:hover { transform: scale(1.02); }
    .card h3 { color: #1e3c72; margin: 0 0 10px 0; font-size: 18px; }
    .info { font-size: 13px; color: #666; margin: 3px 0; }
    .qr { margin-top: 15px; display: flex; justify-content: center; background: #f9f9f9; padding: 10px; border-radius: 10px; }
  </style>
</head>
<body>

<h1>Panel de Administración QR</h1>

<div class="top-bar">
  <div class="filtros-container">
    <input id="buscador" placeholder="Buscar por nombre..." onkeyup="ejecutarFiltros()">
    
    <select id="filtroZona" onchange="ejecutarFiltros()">
      <option value="todas">Todas las Zonas</option>
      <option value="Zona 1">Zona 1</option>
      <option value="Zona 2">Zona 2</option>
      <option value="Zona 3">Zona 3</option>
      <option value="Zona 4">Zona 4</option>
      <option value="Zona 5">Zona 5</option>
      <option value="Zona 6">Zona 6</option>
      <option value="Zona 7">Zona 7</option>
      <option value="Zona 8">Zona 8</option>
      <option value="Zona 9">Zona 9</option>
      <option value="Zona 10">Zona 10</option>
      <option value="Zona 11">Zona 11</option>
    </select>
  </div>

  <button onclick="descargarZIP()">Descargar ZIP (Filtrados)</button>
  <button onclick="generarPDF()">Descargar PDF (Filtrados)</button>
</div>

<div class="paginacion">
  <button id="btnPrev" onclick="cambiarPagina(-1)">« Anterior</button>
  <span id="infoPagina">Página 1 de 1</span>
  <button id="btnNext" onclick="cambiarPagina(1)">Siguiente »</button>
</div>

<div id="lista"></div>

<script>
// --- CONFIGURACIÓN ---
const CLAVE_ADMIN = "012345678910"; // TU CLAVE AQUÍ
let dataCompleta = [];
let dataFiltrada = [];
let paginaActual = 1;
const registrosPorPagina = 50;
let qrMap = {}; // Para descargas

// --- SEGURIDAD ---
const intento = prompt("Ingrese clave de acceso:");
if(intento === CLAVE_ADMIN) {
  document.body.style.display = "block";
  window.onload = cargarDatos;
} else {
  alert("Clave incorrecta");
  window.location.href = "about:blank";
}

function cargarDatos() {
  fetch('data.json')
    .then(res => res.json())
    .then(json => {
      dataCompleta = json;
      dataFiltrada = json;
      actualizarVista();
    })
    .catch(err => console.error("Error al cargar JSON:", err));
}

function ejecutarFiltros() {
  const nombreBusqueda = document.getElementById('buscador').value.toLowerCase();
  const zonaSeleccionada = document.getElementById('filtroZona').value;

  dataFiltrada = dataCompleta.filter(p => {
    const coincideNombre = p.nombre.toLowerCase().includes(nombreBusqueda);
    const coincideZona = (zonaSeleccionada === "todas" || p.zona === zonaSeleccionada);
    return coincideNombre && coincideZona;
  });

  paginaActual = 1;
  actualizarVista();
}

function cambiarPagina(dir) {
  paginaActual += dir;
  actualizarVista();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function actualizarVista() {
  const cont = document.getElementById('lista');
  cont.innerHTML = '';
  qrMap = {}; // Reiniciamos mapa para que solo descargue lo filtrado

  const totalPaginas = Math.ceil(dataFiltrada.length / registrosPorPagina) || 1;
  const inicio = (paginaActual - 1) * registrosPorPagina;
  const items = dataFiltrada.slice(inicio, inicio + registrosPorPagina);

  document.getElementById('infoPagina').innerText = `Página ${paginaActual} de ${totalPaginas} (${dataFiltrada.length} personas)`;
  document.getElementById('btnPrev').disabled = (paginaActual === 1);
  document.getElementById('btnNext').disabled = (paginaActual === totalPaginas);

  items.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'card';
    const qrId = `qr-${p.id}`;

 /* Modificacion de texto que aparece */
    div.innerHTML = `
      <h3>${p.nombre}</h3>
      <div class="info"><b>Zona:</b> ${p.zona || 'N/A'}</div>
      <div class="info"><b>Hab:</b> ${p.habitacion}</div>
      <div class="info"><b>supl:</b>${p.Suplente}</div>
      <div id="${qrId}" class="qr"></div>
    `;
    cont.appendChild(div);

    // Generar QR
    setTimeout(() => {
      const container = document.getElementById(qrId);
      new QRCode(container, {
        text: window.location.origin + '/persona.html?key=' + (p.key || p.id),
        width: 130,
        height: 130
      });
      
      // Guardar en mapa para descargas
      setTimeout(() => {
        const canvas = container.querySelector('canvas');
        if(canvas) qrMap[`${p.id}_${p.nombre}`] = canvas;
      }, 300);
    }, i * 30);
  });
}

// --- FUNCIONES DE DESCARGA ---
async function descargarZIP() {
  if(Object.keys(qrMap).length === 0) return alert("Espera a que carguen los QR");
  const zip = new JSZip();
  for (const nombre in qrMap){
    const base64 = qrMap[nombre].toDataURL("image/png").split(',')[1];
    zip.file(nombre + ".png", base64, {base64: true});
  }
  const content = await zip.generateAsync({type:"blob"});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(content);
  link.download = "QR_Filtrados.zip";
  link.click();
}

async function generarPDF() {
  if(Object.keys(qrMap).length === 0) return alert("Espera a que carguen los QR");
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();
  let x = 10, y = 10;

  for (const nombre in qrMap) {
    const img = qrMap[nombre].toDataURL("image/png");
    pdf.setFontSize(8);
    pdf.text(nombre, x, y);
    pdf.addImage(img, 'PNG', x, y+2, 35, 35);
    x += 50;
    if(x > 160) { x = 10; y += 50; }
    if(y > 250) { pdf.addPage(); x = 10; y = 10; }
  }
  pdf.save("QR_Filtrados.pdf");
}
</script>
</body>
</html>
